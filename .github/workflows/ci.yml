name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  linux:
    name: GNU/Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout coffer
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make pkg-config

      - name: Build
        run: |
          ./autogen.sh
          mkdir build && cd build
          ../configure
          make -j"$(nproc)"

      - name: Run tests
        run: make -C build check

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: build/tests/*.log
          retention-days: 7

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout coffer
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make pkg-config

      - name: Build dist tarball
        run: |
          ./autogen.sh
          mkdir build && cd build
          ../configure
          make dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: build/coffer-*.tar.gz
          generate_release_notes: false
          fail_on_unmatched_files: true
